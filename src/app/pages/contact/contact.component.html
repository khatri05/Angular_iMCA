<div class="container my-5">

    <!-- Heading -->
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">Contact Us</h1>
        <p class="lead text-muted">
            Have questions? We'd love to hear from you.
        </p>
    </div>

    <div class="row g-4">

        <!-- Contact Form -->
        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Send Us a Message</h3>
                </div>

                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" placeholder="Enter your phone number">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" placeholder="Enter subject">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Write your message"></textarea>
                    </div>

                    <button class="btn btn-primary w-100">
                        Send Message
                    </button>

                </div>

            </div>

        </div>

        <!-- Contact Details -->
        <div class="col-lg-5">

            <div class="card shadow-lg border-0 rounded-4 h-100">

                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Contact Information</h3>
                </div>

                <div class="card-body">

                    <p class="mb-4">
                        <strong>📍 Address</strong><br>
                        Asia Campus, Drive In Rd, Thaltej<br>
                        Ahmedabad, Gujarat - 380054
                    </p>

                    <p class="mb-4">
                        <strong>📞 Phone</strong><br>
                        +91 98765 43210
                    </p>

                    <p class="mb-4">
                        <strong>📧 Email</strong><br>
                        <a href="mailto:info@angularapp.com">
                            info&#64;angularapp.com
                        </a>
                    </p>

                    <p class="mb-4">
                        <strong>🌐 Website</strong><br>
                        www.angularapp.com
                    </p>

                    <hr>

                    <h5 class="mb-3">Follow Us</h5>

                    <div class="d-flex gap-2 flex-wrap">

                        <button class="btn btn-primary">
                            Facebook
                        </button>

                        <button class="btn btn-info text-white">
                            Twitter
                        </button>

                        <button class="btn btn-danger">
                            Instagram
                        </button>

                        <button class="btn btn-dark">
                            GitHub
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Google Map -->
    <div class="card shadow-lg border-0 rounded-4 mt-5">

        <div class="card-header bg-success text-white">
            <h3 class="mb-0">Our Location</h3>
        </div>

        <div class="card-body p-0">

            <iframe src="https://www.google.com/maps?q=Ahmedabad&output=embed" width="100%" height="350" style="border:0;"
                loading="lazy">
            </iframe>

        </div>

    </div>

</div>
