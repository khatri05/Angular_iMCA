<div class="container mt-5">

    <!-- Heading -->
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">🎓 Angular Course Details</h2>
        <p class="text-muted">Learn Angular with our professional course.</p>
    </div>

    <!-- Search Course -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <span class="input-group-text">🔍</span>
                <input type="text" class="form-control" placeholder="Enter Course Name" [(ngModel)]="courseTitle">
            </div>
        </div>
    </div>

    <!-- Course Card -->
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center">
                    <h4>{{ courseTitle }}</h4>
                </div>

                <div class="card-body">

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">
                            📘 Course Title
                        </div>

                        <div class="col-md-8">
                            {{ courseTitle }}
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">
                            ⏳ Duration
                        </div>

                        <div class="col-md-8">
                            {{ courseDuration }}
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">
                            💰 Fees
                        </div>

                        <div class="col-md-8">
                            ₹ {{ courseFees }}
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-4 fw-bold">
                            👨‍🏫 Faculty
                        </div>

                        <div class="col-md-8">
                            {{ courseFaculty }}
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-4">
                        <div class="col-md-4 fw-bold">
                            ✅ Availability
                        </div>

                        <div class="col-md-8">

                            @if (isCourseAvailable) {
                            <span class="badge bg-success">Available</span>
                            } @else {
                            <span class="badge bg-danger">Not Available</span>
                            }

                        </div>
                    </div>

                    <div class="text-center">
                        <button class="btn btn-success btn-lg px-5" (click)="courseEnrollment()">
                            Enroll Now
                        </button>
                    </div>

                </div>

            </div>

        </div>
    </div>

</div>
