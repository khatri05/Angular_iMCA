<div class="container mt-5">

    <h1 class="text-center text-primary fw-bold mb-5">
        📊 Summary Data
    </h1>

    <div class="row justify-content-center">

        <!-- Total Students -->
        <div class="col-md-5 mb-4">
            <div class="card shadow-lg border-0 rounded-4 text-center h-100">

                <div class="card-body">

                    <h1 class="display-3 text-primary">👨‍🎓</h1>

                    <h4 class="fw-bold">Total Students</h4>

                    <h2 class="text-success mt-3">
                        {{studentLength}}
                    </h2>

                </div>

            </div>
        </div>

        <!-- Total Courses -->
        <div class="col-md-5 mb-4">
            <div class="card shadow-lg border-0 rounded-4 text-center h-100">

                <div class="card-body">

                    <h1 class="display-3 text-warning">📚</h1>

                    <h4 class="fw-bold">Total Courses</h4>

                    <h2 class="text-danger mt-3">
                        {{courseLength}}
                    </h2>

                </div>

            </div>
        </div>

    </div>

</div>
